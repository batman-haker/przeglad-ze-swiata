server {
    listen 40348;
    listen [::]:40348;
    server_name _;
    root /opt/tablica-swiat/site;
    index index.html;
    charset utf-8;

    location ~* \.(html|js|css|json)$ {
        add_header Cache-Control "private, no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header CDN-Cache-Control "no-store";
        add_header Cloudflare-CDN-Cache-Control "no-store";
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json text/plain text/html;
    gzip_vary on;
}
