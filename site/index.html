<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Przegląd ze świata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Banner -->
  <header class="site-banner">
    <img src="logoprzeeglad.png" alt="Logo" class="banner-logo">
    <div class="banner-text">
      <span class="banner-title">Przegląd</span>
      <span class="banner-subtitle">Świata</span>
    </div>
  </header>

  <!-- Ticker notowań -->
  <div class="ticker-wrap">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
      {
        "symbols": [
          {"description": "S&P 500",  "proName": "FOREXCOM:SPXUSD"},
          {"description": "Nasdaq",   "proName": "FOREXCOM:NSXUSD"},
          {"description": "DAX",      "proName": "XETR:DAX"},
          {"description": "WIG20",    "proName": "GPW:WIG20"},
          {"description": "Nvidia",   "proName": "NASDAQ:NVDA"},
          {"description": "Apple",    "proName": "NASDAQ:AAPL"},
          {"description": "Tesla",    "proName": "NASDAQ:TSLA"},
          {"description": "Microsoft","proName": "NASDAQ:MSFT"},
          {"description": "Amazon",   "proName": "NASDAQ:AMZN"},
          {"description": "QQQ",      "proName": "NASDAQ:QQQ"},
          {"description": "AMD",      "proName": "NASDAQ:AMD"},
          {"description": "Intel",    "proName": "NASDAQ:INTC"},
          {"description": "BTC",      "proName": "COINBASE:BTCUSD"},
          {"description": "ETH",      "proName": "COINBASE:ETHUSD"},
          {"description": "Złoto",    "proName": "FOREXCOM:XAUUSD"},
          {"description": "Srebro",   "proName": "FOREXCOM:XAGUSD"},
          {"description": "Miedź",    "proName": "COMEX:HG1!"},
          {"description": "KGHM",     "proName": "GPW:KGH"},
          {"description": "Ropa WTI", "proName": "NYMEX:CL1!"},
          {"description": "USD/PLN",  "proName": "FX:USDPLN"},
          {"description": "EUR/PLN",  "proName": "FX:EURPLN"}
        ],
        "showSymbolLogo": true,
        "colorTheme": "dark",
        "isTransparent": true,
        "displayMode": "adaptive",
        "locale": "pl"
      }
      </script>
    </div>
  </div>

  <!-- Pasek nawigacji + meta -->
  <nav class="viewnav">
    <div class="viewnav-inner">
      <button class="view-btn active" data-view="timeline">📋 Tablica</button>
      <button class="view-btn" data-view="dashboard">📊 Statystyki</button>
      <button class="view-btn" data-view="map">🗺️ Mapa</button>
      <button class="view-btn" data-view="analiza">📅 Analiza dnia</button>
      <button class="view-btn" data-view="iran">🔥 Iran / Ormuz</button>
      <span class="viewnav-meta">
        <span id="event-count">—</span> wydarzeń
        <span class="sep">·</span>
        <span id="last-update">—</span>
      </span>
    </div>
  </nav>

  <!-- ════════════════ WIDOK: TABLICA ════════════════ -->
  <div id="view-timeline" class="view active">

    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="filters" id="filters">
          <button class="filter-btn active" data-filter="all">Wszystkie</button>
          <button class="filter-btn" data-filter="geopolityka">Geopolityka</button>
          <button class="filter-btn" data-filter="gospodarka">Gospodarka</button>
          <button class="filter-btn" data-filter="rynki">Rynki</button>
          <button class="filter-btn" data-filter="energia">Energia</button>
          <button class="filter-btn" data-filter="technologia">Technologia</button>
          <button class="filter-btn" data-filter="polska">Polska</button>
        </div>
        <div class="search-wrap">
          <input type="search" id="search" placeholder="Szukaj…" autocomplete="off">
        </div>
      </div>
    </div>

    <main class="main">
      <div class="timeline" id="timeline">
        <div class="loading">Ładowanie wydarzeń…</div>
      </div>
    </main>

  </div>

  <!-- ════════════════ WIDOK: DASHBOARD ════════════════ -->
  <div id="view-dashboard" class="view">
    <div class="dash-grid">

      <div class="dash-card">
        <div class="dash-title">Kategorie</div>
        <canvas id="chart-kategorie"></canvas>
      </div>

      <div class="dash-card">
        <div class="dash-title">Waga wydarzeń</div>
        <canvas id="chart-waga"></canvas>
      </div>

      <div class="dash-card dash-wide">
        <div class="dash-title">Aktywność per dzień</div>
        <canvas id="chart-aktywnosc"></canvas>
      </div>

      <div class="dash-card">
        <div class="dash-title">Top 10 podmiotów</div>
        <canvas id="chart-podmioty"></canvas>
      </div>

      <div class="dash-card">
        <div class="dash-title">Typy wydarzeń</div>
        <canvas id="chart-typy"></canvas>
      </div>

    </div>
  </div>

  <!-- ════════════════ WIDOK: MAPA ════════════════ -->
  <div id="view-map" class="view">
    <div id="leaflet-map"></div>
    <div class="map-legend" id="map-legend"></div>
  </div>

  <!-- ════════════════ WIDOK: ANALIZA DNIA ════════════════ -->
  <div id="view-analiza" class="view">
    <div class="analiza-wrap" id="analiza-container"></div>
  </div>

  <!-- ════════════════ WIDOK: IRAN ════════════════ -->
  <div id="view-iran" class="view">
    <div class="iran-header">
      <div class="iran-title">☢️ Wątek: Iran / Ormuz / Konflikt</div>
      <div class="iran-sub" id="iran-count">—</div>
    </div>
    <div class="iran-timeline" id="iran-timeline"></div>
  </div>

  <!-- Modal: Podmiot -->
  <div id="entity-modal" class="entity-modal hidden" role="dialog" aria-modal="true">
    <div class="entity-modal-backdrop"></div>
    <div class="entity-modal-panel">
      <div class="entity-modal-header">
        <div>
          <div class="entity-modal-name" id="entity-modal-name"></div>
          <div class="entity-modal-meta" id="entity-modal-meta"></div>
        </div>
        <button class="entity-modal-close" id="entity-modal-close" aria-label="Zamknij">✕</button>
      </div>
      <canvas id="entity-chart" class="entity-chart-canvas"></canvas>
      <div class="entity-modal-body" id="entity-modal-body"></div>
    </div>
  </div>

  <footer class="footer">
    Przegląd Świata · dane aktualizowane automatycznie
  </footer>

  <script src="app.js?v=20260520"></script>
</body>
</html>
